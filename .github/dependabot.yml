version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '08:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    labels:
      - 'dependencies'
    groups:
      react-ecosystem:
        patterns:
          - 'react*'
          - '@types/react*'
      testing-ecosystem:
        patterns:
          - 'jest*'
          - '@types/jest*'
          - '@testing-library*'
          - 'ts-jest'
      build-tools:
        patterns:
          - 'webpack*'
          - 'copy-webpack-plugin'
          - 'mini-css-extract-plugin'
          - 'html-webpack-plugin'
          - '@babel/*'